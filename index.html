<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 10 JKBOSE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 18px;
  font-size: 14px;
  background: rgba(0,0,0,0.3);
  color: #facc15;
  letter-spacing: 1px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px 30px;
}

.hero h1 {
  font-size: 42px;
  font-weight: 600;
}

.hero p {
  color: #e0e7ff;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
  max-width: 900px;
  margin: auto;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 25px;
  text-align: center;
  text-decoration: none;
  color: white;
  backdrop-filter: blur(6px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  background: rgba(255,255,255,0.2);
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  color: #e0e7ff;
}
</style>
</head>

<body>

<div class="header">
  DEVELOPED BY MATEEN YOUSUF — TEACHER — SCHOOL EDUCATION DEPARTMENT J&K
</div>

<div class="hero">
  <h1>Class 10</h1>
  <p>JKBOSE Digital Learning Hub</p>
</div>

<div class="container">

  <a class="card" href="Class 10th Maths/">📐 Mathematics</a>
  <a class="card" href="Class 10th Science/">🔬 Science</a>
  <a class="card" href="Class 10th Social Science/">🌍 Social Science</a>
  <a class="card" href="Class 10th Urdu/">📘 Urdu</a>

</div>

<div class="footer">
  © 2026 • Foundation Learning Platform
</div>

</body>
</html>
